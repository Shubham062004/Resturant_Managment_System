version: '3.8'

services:
  db-postgres:
    image: postgres:16-alpine
    container_name: oven-xpress-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password_9922
      POSTGRES_DB: oven_xpress
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d oven_xpress"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-mongodb:
    image: mongo:7.0
    container_name: oven-xpress-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: oven_xpress
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oven-xpress-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://admin:admin_password_9922@db-postgres:5432/oven_xpress?schema=public
      MONGODB_URI: mongodb://db-mongodb:27017/oven_xpress
      JWT_SECRET: c6747b0e14a1a364be167d3d2db70fa1c4f03932785d99723cb8d234a9ef3878
      JWT_EXPIRES_IN: 1d
    ports:
      - "5000:5000"
    depends_on:
      db-postgres:
        condition: service_healthy
      db-mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oven-xpress-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:

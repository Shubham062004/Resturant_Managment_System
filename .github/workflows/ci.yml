name: Oven Xpress CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Build & Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Unit Tests (Vitest)
        run: npm run test
        working-directory: ./backend

      - name: Run Frontend Unit Tests (Vitest)
        run: npm run test
        working-directory: ./frontend

      - name: Run Playwright E2E Tests
        run: npx playwright test
        continue-on-error: true

      - name: Security Scan
        run: npm audit --audit-level=high

      - name: Build Projects Formatting (Prettier)
        run: npm run format:check

      - name: Lint Workspace Packages (ESLint)
        run: npm run lint

      - name: Validate Prisma Schema
        run: |
          cd backend
          npx prisma validate --schema src/database/schema.prisma

      - name: Generate Backend Relational Database Client
        run: |
          cd backend
          npx prisma generate --schema src/database/schema.prisma

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      - name: Compile Frontend TypeScript & Bundle Webpack
        run: |
          cd frontend
          npm run build

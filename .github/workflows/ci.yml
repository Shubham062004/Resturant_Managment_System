name: Oven Xpress CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Build & Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-size: '18.x'
          cache: 'npm'

      - name: Install Workspace Dependencies
        run: npm install

      - name: Verify Code Formatting (Prettier)
        run: npm run format:check

      - name: Lint Workspace Packages (ESLint)
        run: npm run lint

      - name: Generate Backend Relational Database Client
        run: |
          cd backend
          npx prisma generate --schema src/database/schema.prisma

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      - name: Compile Frontend TypeScript & Bundle Webpack
        run: |
          cd frontend
          npm run build

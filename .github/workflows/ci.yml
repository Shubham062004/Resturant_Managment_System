name: ABC CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Build & Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate and Inject DATABASE_URL
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL secret is missing! Using dummy URL for CI validation."
            echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> $GITHUB_ENV
          else
            echo "DATABASE_URL exists"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Validate Prisma Schema
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          cd backend
          npx prisma validate --schema src/database/schema.prisma

      - name: Generate Backend Relational Database Client
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          cd backend
          npx prisma generate --schema src/database/schema.prisma

      - name: Build Projects Formatting (Prettier)
        run: npm run format:check

      - name: Lint Workspace Packages (ESLint)
        run: npm run lint

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      - name: Compile Frontend TypeScript & Bundle Webpack
        run: |
          cd frontend
          npm run build

      - name: Run Backend Unit Tests (Vitest)
        run: npm run test
        working-directory: ./backend

      - name: Run Frontend Unit Tests (Vitest)
        run: npm run test
        working-directory: ./frontend

      - name: Security Scan
        run: npm audit --audit-level=high

      - name: Run Playwright E2E Tests
        run: npx playwright test
        continue-on-error: true

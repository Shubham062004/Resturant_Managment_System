name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prettier Check
        run: npm run format:check

      - name: ESLint Check
        run: npm run lint

      - name: Prisma Validate
        run: npm run prisma:validate -w backend || npx prisma validate --schema backend/src/database/schema.prisma

      - name: Prisma Generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
        run: npm run prisma:generate -w backend

      - name: Type Check (Frontend)
        run: npm run typecheck -w frontend || npx tsc --noEmit -p frontend/tsconfig.app.json

      - name: Type Check (Backend)
        run: npm run typecheck -w backend || npx tsc --noEmit -p backend/tsconfig.json

      - name: Build Frontend
        run: npm run build -w frontend

      - name: Build Backend
        run: npm run build -w backend
